name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          RAFFLE_START_DATE: ${{ vars.RAFFLE_START_DATE }}
          RAFFLE_END_DATE: ${{ vars.RAFFLE_END_DATE }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secrets."
            exit 1
          fi
          START_DATE="${RAFFLE_START_DATE:-2026-07-11T13:00:00+02:00}"
          END_DATE="${RAFFLE_END_DATE:-2026-07-13T13:00:00+02:00}"
          cat > docs/js/config.js <<EOF
          window.SITE_CONFIG = {
            supabaseUrl: '${SUPABASE_URL}',
            supabaseAnonKey: '${SUPABASE_ANON_KEY}',
            raffleStartDate: '${START_DATE}',
            raffleEndDate: '${END_DATE}',
          };
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
